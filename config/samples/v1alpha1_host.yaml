apiVersion: osac.openshift.io/v1alpha1
kind: Host
metadata:
  labels:
    app.kubernetes.io/name: host-operator
    app.kubernetes.io/managed-by: kustomize
  name: host-sample
spec:
  # Ironic node UUID (or name) this Host represents
  nodeID: "519d6b37-13a9-444c-9a2a-bcac8a33dc44"
  # Controller or system that manages this host (immutable)
  managedBy: "baremetal-cluster"
  # Class/capability tier of the host (immutable)
  hostClass: "default"
  # Desired power state: true = power on, false = power off
  online: false
