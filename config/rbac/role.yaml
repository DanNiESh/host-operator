---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - osac.openshift.io
  resources:
  - hosts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - osac.openshift.io
  resources:
  - hosts/finalizers
  verbs:
  - update
- apiGroups:
  - osac.openshift.io
  resources:
  - hosts/status
  verbs:
  - get
  - patch
  - update
